experiment:
  name: "baseline_monolithic_run"
  architecture: "monolithic" # monolithic, master_worker, queue_based, swarm
  worker_count: 1
  task_type: "A" # A (Map-Reduce), B (Multi-Hop QA)

workload:
  chunk_count: 10
  dataset_path: "./data/dummy_task_a.json"
  total_requests: 10
  requests_per_second: 5.0

simulation:
  mock_inference_latency_ms: 50
  timeout_threshold_ms: 5000
  retry_policy:
    enabled: true
    max_retries: 3

failure_injection:
  mode: "none" # none, crash, straggler
  target_worker_id: null
  timing_ms: 0
  straggler_delay_ms: 0

