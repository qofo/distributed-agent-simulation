version: '3.8'

services:
  mock_llm:
    build: 
      context: ./mock_llm
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    networks:
      - agent_network

  # Message broker for queue-based architecture
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - agent_network

networks:
  agent_network:
    driver: bridge
